on:
  push:
    branches:
      - main
      - Development
      - feature/**
  pull_request:
    branches:
      - main
      - development
 
jobs:
  test:
    runs-on: ubuntu-latest  # Of windows-latest/macOS-latest als specifiek platform nodig is
    steps:
      - name: Haal de repository op
        uses: actions/checkout@v4
 
      - name: Installeer .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'  # Gebruik de juiste versie voor MAUI
 
      - name: Installeer MAUI workloads
        run: dotnet workload install maui-android
 
      - name: Herstel afhankelijkheden
        run: dotnet restore Grocery.App/Grocery.App.csproj
      
      - name: Bouw de applicatie
        run: dotnet build Grocery.App/Grocery.App.csproj --configuration Release --no-restore --framework net8.0-android
      
      - name: Voer unit tests uit
        run: dotnet test Grocery.App/Grocery.App.csproj --configuration Release --no-restore --no-build --framework net8.0-android --verbosity normal

